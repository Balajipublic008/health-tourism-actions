name: 2. GKE Blue Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'gcp-infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  GKE_CLUSTER: med-tour-cluster
  GKE_ZONE: us-central1-a
  IMAGE: medical-tourism-app
  PROJECT_ID: project-b0bf8b45-36f1-4568-966

jobs:
  build-and-publish:
    name: Setup, Build, Publish
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCR
      run: |-
        gcloud auth configure-docker gcr.io

    - name: Build Docker Image
      run: |-
        docker build \
          --tag "gcr.io/$PROJECT_ID/$IMAGE:${{ github.sha }}" \
          .

    - name: Publish Docker Image to GCR
      run: |-
        docker push "gcr.io/$PROJECT_ID/$IMAGE:${{ github.sha }}"

  deploy-blue:
    name: Deploy to Blue Environment
    needs: build-and-publish
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Deploy Blue to GKE
      run: |-
        # Ensure blue namespace exists
        kubectl create namespace blue --dry-run=client -o yaml | kubectl apply -f -
        
        # Replace the image placeholder in the manifest with the newly built image
        sed -i "s|image: .*|image: gcr.io/${{ env.PROJECT_ID }}/$IMAGE:${{ github.sha }}|g" k8s/blue-green/deployment-blue.yaml
        
        # Apply the deployment to blue namespace
        kubectl apply -f k8s/blue-green/deployment-blue.yaml -n blue
        
        # Wait for the rollout to complete successfully
        kubectl rollout status deployment/medical-tourism-blue -n blue --timeout=300s

  test-blue:
    name: Test Blue Environment
    needs: deploy-blue
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Run Tests on Blue
      run: |-
        echo "Testing Blue deployment status..."
        kubectl get pods -n blue -l color=blue
        
        echo "Testing API health endpoint from inside the cluster..."
        # Test the health endpoint of blue deployment pods directly
        POD_NAME=$(kubectl get pods -n blue -l color=blue -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n blue $POD_NAME -- curl -s http://localhost:3000/api/health
        echo -e "\nBlue environment is healthy and successfully tested!"
