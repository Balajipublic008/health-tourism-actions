name: Terraform Runner

on:
  workflow_call:
    inputs:
      working_dir:
        required: true
        type: string
      project_id:
        required: true
        type: string
      action:
        required: true
        type: string
      # Added for better reusability
      wif_provider:
        required: false
        type: string
        default: "projects/223480410234/locations/global/workloadIdentityPools/github/providers/health-tourism-actions"
  
jobs:
  terraform:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: medical@${{ inputs.project_id }}.iam.gserviceaccount.com
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        # Using a ternary-style logic or separate steps is fine
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            terraform init -backend=false
          else
            terraform init
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -var="project_id=${{ inputs.project_id }}"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -var="project_id=${{ inputs.project_id }}"

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var="project_id=${{ inputs.project_id }}"