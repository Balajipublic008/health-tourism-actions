name: Terraform Runner

on:
  workflow_call:

    inputs:
      working_dir:
        required: true
        type: string
      project_id:
        required: true
        type: string
      action:
        required: true
        type: string
  
jobs:
  terraform:
    runs-on: ubuntu-latest
    
    # Permissions must be redefined in the job if needed for OIDC
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ inputs.working_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Auth only when NOT PR (assuming PRs don't have secrets access)
      - name: Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2 # Updated to v2+ for stability
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: projects/223480410234/locations/global/workloadIdentityPools/github/providers/health-tourism-actions
          service_account: medical@${{ inputs.project_id }}.iam.gserviceaccount.com
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ⚠️ PR → disable backend (no auth)
      - name: Terraform Init (PR)
        if: github.event_name == 'pull_request'
        run: terraform init -backend=false

      # ✅ Normal init
      - name: Terraform Init
        if: github.event_name != 'pull_request'
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -var="project_id='${{ inputs.project_id }}'"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -var="project_id='${{ inputs.project_id }}'"
      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var="project_id='${{ inputs.project_id }}'"