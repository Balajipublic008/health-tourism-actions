name: Terraform Runner

on:
  workflow_call:
    inputs:
      working_dir:
        required: true
        type: string
      project_id:
        required: true
        type: string
      action:
        required: true
        type: string
    secrets:
      gcp_credentials:
        required: true
  
jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev # Added environment here so it can access the 'dev' environment variables
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.gcp_credentials }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        # Using a ternary-style logic or separate steps is fine
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            terraform init -backend=false
          else
            terraform init
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -var="project_id=${{ inputs.project_id }}"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -var="project_id=${{ inputs.project_id }}"

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var="project_id=${{ inputs.project_id }}"
