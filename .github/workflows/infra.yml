name: Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "plan | apply | destroy"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

jobs:
  manual-deploy:
    runs-on: ubuntu-latest
    # 1. Access the 'dev' environment for variables
    environment: dev
    # 2. CALL the reusable workflow (NO runs-on, NO steps here!) 
    uses: ./.github/workflows/terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: ${{ inputs.action }}