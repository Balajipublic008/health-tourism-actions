name: Infra Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "plan | apply | destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  # 🔹 PR → PLAN ONLY
  pr-plan:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/templates/terraform.yaml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: plan

  # 🔹 MAIN → APPLY (with approval via environment)
  apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    uses: ./.github/workflows/templates/terraform.yaml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: apply

  # 🔹 MANUAL CONTROL (plan/apply/destroy)
  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/templates/terraform.yaml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: ${{ inputs.action }}