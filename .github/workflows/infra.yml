name: Infra Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "plan | apply | destroy"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

jobs:
  # 🔹 PR → PLAN ONLY
  pr-plan:
    if: github.event_name == 'pull_request'
    uses: .\.github\workflows\terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: plan

  # 🔹 MAIN → APPLY
  # NOTE: Environment must be defined INSIDE the called workflow or 
  # handled differently, as 'environment' and 'uses' (workflow) can conflict 
  # if not structured specifically.
  apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: .\.github\workflows\terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: apply
    # To use environments with reusable workflows, the 'environment' 
    # property is usually placed inside the JOB within the template file.

  # 🔹 MANUAL CONTROL
  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: .\.github\workflows\terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: ${{ inputs.action }}