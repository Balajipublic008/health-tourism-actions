name: Infra Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "plan | apply | destroy"
        required: true
        default: "plan"

permissions:
  id-token: write
  contents: read

jobs:

  pr-plan:
    if: github.event_name == 'pull_request'
    uses: ./.github/templates/terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: plan

  apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod
    uses: ./.github/templates/terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: apply

  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/templates/terraform.yml
    with:
      working_dir: ./gcp-infra
      project_id: ${{ vars.GCP_PROJECT_ID }}
      action: ${{ github.event.inputs.action }}