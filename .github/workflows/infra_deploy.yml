name: Build and Deploy to GKE

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # REQUIRED for Workload Identity Federation

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: med-tour-cluster
  GKE_ZONE: us-central1-a
  IMAGE: medical-tourism-app
  TARGET_COLOR: green
  ACTIVE_COLOR: blue

jobs:
  terraform-deploy:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ./gcp-infra

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - id: auth
      name: Authenticate to Google Cloud (WIF)
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: projects/223480410234/locations/global/workloadIdentityPools/github/providers/health-tourism-actions
        service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -var="project_id=${{ secrets.GCP_PROJECT_ID }}"

  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    needs: terraform-deploy
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - id: auth
      name: Authenticate to Google Cloud (WIF)
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: projects/223480410234/locations/global/workloadIdentityPools/github/providers/health-tourism-actions
        service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker gcr.io

    - name: Build Docker Image
      run: |
        docker build \
          --tag "gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA" \
          --tag "gcr.io/$PROJECT_ID/$IMAGE:$TARGET_COLOR" \
          .

    - name: Publish Docker Image to GCR
      run: |
        docker push "gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA"
        docker push "gcr.io/$PROJECT_ID/$IMAGE:$TARGET_COLOR"

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Deploy Target Color (Green)
      run: |
        sed -i "s|image: .*|image: gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA|g" k8s/blue-green/deployment-$TARGET_COLOR.yaml
        kubectl apply -f k8s/blue-green/deployment-$TARGET_COLOR.yaml
        kubectl rollout status deployment/medical-tourism-$TARGET_COLOR

    - name: Switch Traffic
      run: |
        kubectl patch service medical-tourism-service -p "{\"spec\":{\"selector\":{\"color\":\"$TARGET_COLOR\"}}}"

    - name: Scale down Old Deployment
      run: |
        kubectl scale deployment medical-tourism-$ACTIVE_COLOR --replicas=0