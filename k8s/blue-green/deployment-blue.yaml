apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-tourism-blue
  namespace: blue
  labels:
    app: medical-tourism
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-tourism
      color: blue
  template:
    metadata:
      labels:
        app: medical-tourism
        color: blue
    spec:
      containers:
      - name: medical-tourism-web
        # This will be replaced by Azure DevOps during deployment
        image: gcr.io/YOUR_PROJECT_ID/medical-tourism-app:blue 
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
